name: API Performance Test

on:
  workflow_run:
    workflows: ["Dev Deployment"]
    types:
      - completed

jobs:
  jmeter-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout API Code
        uses: actions/checkout@v3
        with:
          repository: gogo-transit-repo/train-api
          ref: dev
          fetch-depth: 0
          path: dev

      - name: Install JMeter
        run: |
          sudo apt update
          sudo apt install -y jmeter

      - name: Create JMeter Test Plan
        run: |
          mkdir -p jmeter
          cat <<EOF > jmeter/trainstation_test.jmx
          <?xml version="1.0" encoding="UTF-8"?>
          <jmeterTestPlan version="1.2" properties="5.0" jmeter="5.5">
            <hashTree>
              <TestPlan guiclass="TestPlanGui" testclass="TestPlan" testname="TrainStation API Test Plan" enabled="true">
                <elementProp name="TestPlan.user_defined_variables" elementType="Arguments"/>
              </TestPlan>
              <hashTree>
                <ThreadGroup guiclass="ThreadGroupGui" testclass="ThreadGroup" testname="Thread Group" enabled="true">
                  <stringProp name="ThreadGroup.num_threads">5</stringProp>
                  <stringProp name="ThreadGroup.ramp_time">5</stringProp>
                  <elementProp name="ThreadGroup.main_controller" elementType="LoopController">
                    <boolProp name="LoopController.continue_forever">false</boolProp>
                    <stringProp name="LoopController.loops">2</stringProp>
                  </elementProp>
                </ThreadGroup>
                <hashTree>
                  <HTTPSamplerProxy guiclass="HttpTestSampleGui" testclass="HTTPSamplerProxy" testname="GET /stations" enabled="true">
                    <elementProp name="HTTPsampler.Arguments" elementType="Arguments"/>
                    <stringProp name="HTTPSampler.domain">dev-apim-host</stringProp>
                    <stringProp name="HTTPSampler.port">443</stringProp>
                    <stringProp name="HTTPSampler.protocol">https</stringProp>
                    <stringProp name="HTTPSampler.path">/trainstationapi/1.0.0/stations</stringProp>
                    <stringProp name="HTTPSampler.method">GET</stringProp>
                  </HTTPSamplerProxy>
                  <hashTree/>
                </hashTree>
              </hashTree>
            </hashTree>
          </jmeterTestPlan>
          EOF

      - name: Run JMeter Tests
        run: jmeter -n -t jmeter/trainstation_test.jmx -l jmeter/results.jtl

      - name: Upload JMeter Results
        uses: actions/upload-artifact@v3
        with:
          name: jmeter-results
          path: jmeter/results.jtl
