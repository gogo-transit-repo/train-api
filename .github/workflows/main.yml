name: API Validation Build
on:
  pull_request_target:
    branches:
      - base
    types: 
      - opened
      - synchronize
  workflow_dispatch:
jobs:
  build:
    name: API Validation Build
    runs-on: ubuntu-latest
    steps:
      - name: Install API Controller
        run: |
          mkdir -p tools
          wget https://github.com/wso2/product-apim-tooling/releases/download/v4.5.0/apictl-4.5.0-linux-amd64.tar.gz
          tar -xzvf apictl-4.5.0-linux-amd64.tar.gz
          mv apictl tools/

      - name: Checkout API Code
        uses: actions/checkout@v3
        with:
          fetch-depth: "0"
          path: base
          
      - name: Set release username and email
        shell: sh
        run: |
          git config --global user.name ${{ secrets.BOT_USER }}
          git config --global user.email ${{ secrets.BOT_EMAIL }}
          
      - name: Checkout Pull Request and Merge.
        shell: sh
        if: github.event_name == 'pull_request_target'
        run: |
          cd base
          gh pr checkout ${{ github.event.number }} -b pr-${{ github.event.number }}
          git checkout pr-${{ github.event.number }}
          git merge origin/base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup API Controller Configurations
        run: |
          mkdir -p $HOME/.wso2apictl
          echo "$CTL_CONFIG" | sed 's/, /\n  /g' >> $HOME/.wso2apictl/main_config.yaml
          cat $HOME/.wso2apictl/main_config.yaml
          mkdir -p $HOME/.wso2apictl.local
          echo "$CTL_KEYS" | sed 's/, /\n  /g' >> $HOME/.wso2apictl.local/keys.json
        env:
          CTL_CONFIG: ${{ secrets.CTL_CONFIG }}
          CTL_KEYS: ${{ secrets.CTL_KEYS }}
          
      - name: Login to Dev Environment
        shell: sh
        run: |
          tools/apictl/apictl login dev -u ${{ secrets.DEV_USERNAME }} -p ${{ secrets.DEV_PASSWORD }} --insecure
          
      - name: Run Governance Validation
        run: |
          tools/apictl/apictl import api -f "base/TrainStationApi/1.0.0/TrainStationApi-1.0.0" -e dev -k --dry-run > result.txt || true
          if grep -qE '\|.*\|\s*ERROR\s*\|' result.txt; then
            echo "::error ::Governance errors found. PR cannot be merged."
            exit 1
          else
            echo "No ERROR-level governance issues. Proceeding..."
          fi

      - name: Post Governance Report as PR Comment
        shell: sh
        if: github.event_name == 'pull_request_target' && always()
        run: |
          cd base
          echo '```' > ../comment.txt
          cat ../result.txt >> ../comment.txt
          echo '```' >> ../comment.txt
          gh pr comment ${{ github.event.number }} --body "$(cat ../comment.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
