name: API Performance Test

on:
  workflow_dispatch:

jobs:
  jmeter-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API Code
        uses: actions/checkout@v3
        with:
          repository: gogo-transit-repo/train-api
          ref: dev
          fetch-depth: 0
          path: dev
          
      - name: Setup Hosts
        run: sudo echo "${HOST_ENTRY}" | sudo tee -a /etc/hosts
        env:
          HOST_ENTRY: ${{ secrets.HOST_ENTRY }}

      - name: Setup Hosts
        run: sudo echo "${HOST_ENTRY}" | sudo tee -a /etc/hosts
        env:
          HOST_ENTRY: ${{ secrets.HOST_ENTRY }}

      - name: Install JMeter
        run: |
          sudo apt update
          sudo apt install -y openjdk-11-jdk wget
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.5.tgz
          tar -xzf apache-jmeter-5.5.tgz
          echo "$PWD/apache-jmeter-5.5/bin" >> $GITHUB_PATH

      - name: Create JMeter Test Plan
        shell: bash
        run: |
          mkdir -p jmeter
          cat > jmeter/trainstation_test.jmx <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <jmeterTestPlan version="1.2" properties="5.0" jmeter="5.5">
            <hashTree>
              <TestPlan guiclass="TestPlanGui" testclass="TestPlan" testname="TrainStation API Test Plan" enabled="true">
                <elementProp name="TestPlan.user_defined_variables" elementType="Arguments">
                  <collectionProp name="Arguments.arguments">
                    <elementProp name="station_id" elementType="Argument">
                      <stringProp name="Argument.name">station_id</stringProp>
                      <stringProp name="Argument.value">ST123</stringProp>
                      <stringProp name="Argument.metadata">=</stringProp>
                    </elementProp>
                  </collectionProp>
                </elementProp>
              </TestPlan>
              <hashTree>
                <ThreadGroup guiclass="ThreadGroupGui" testclass="ThreadGroup" testname="Thread Group" enabled="true">
                  <stringProp name="ThreadGroup.num_threads">1</stringProp>
                  <stringProp name="ThreadGroup.ramp_time">1</stringProp>
                  <elementProp name="ThreadGroup.main_controller" elementType="LoopController">
                    <boolProp name="LoopController.continue_forever">false</boolProp>
                    <stringProp name="LoopController.loops">1</stringProp>
                  </elementProp>
                </ThreadGroup>
                <hashTree>
                  <!-- GET /stations -->
                  <HTTPSamplerProxy guiclass="HttpTestSampleGui" testclass="HTTPSamplerProxy" testname="GET /stations" enabled="true">
                    <elementProp name="HTTPsampler.Arguments" elementType="Arguments"/>
                    <stringProp name="HTTPSampler.domain">gw.apim.com</stringProp>
                    <stringProp name="HTTPSampler.port">8243</stringProp>
                    <stringProp name="HTTPSampler.protocol">https</stringProp>
                    <stringProp name="HTTPSampler.path">/trainstationapi/1.0.0/stations</stringProp>
                    <stringProp name="HTTPSampler.method">GET</stringProp>
                    <boolProp name="HTTPSampler.follow_redirects">true</boolProp>
                    <boolProp name="HTTPSampler.use_keepalive">true</boolProp>
                    <elementProp name="HeaderManager.headers" elementType="HeaderManager">
                      <collectionProp name="HeaderManager.headers">
                        <elementProp name="Internal-Key" elementType="Header">
                          <stringProp name="Header.name">Internal-Key</stringProp>
                          <stringProp name="Header.value">\${__P(api_key)}</stringProp>
                        </elementProp>
                        <elementProp name="accept" elementType="Header">
                          <stringProp name="Header.name">accept</stringProp>
                          <stringProp name="Header.value">application/json</stringProp>
                        </elementProp>
                      </collectionProp>
                    </elementProp>
                  </HTTPSamplerProxy>
                  <hashTree/>
          
                  <!-- GET /stations/{station_id} -->
                  <HTTPSamplerProxy guiclass="HttpTestSampleGui" testclass="HTTPSamplerProxy" testname="GET /stations/{station_id}" enabled="true">
                    <elementProp name="HTTPsampler.Arguments" elementType="Arguments"/>
                    <stringProp name="HTTPSampler.domain">gw.apim.com</stringProp>
                    <stringProp name="HTTPSampler.port">8243</stringProp>
                    <stringProp name="HTTPSampler.protocol">https</stringProp>
                    <stringProp name="HTTPSampler.path">/trainstationapi/1.0.0/stations/\${station_id}</stringProp>
                    <stringProp name="HTTPSampler.method">GET</stringProp>
                    <boolProp name="HTTPSampler.follow_redirects">true</boolProp>
                    <boolProp name="HTTPSampler.use_keepalive">true</boolProp>
                    <elementProp name="HeaderManager.headers" elementType="HeaderManager">
                      <collectionProp name="HeaderManager.headers">
                        <elementProp name="Internal-Key" elementType="Header">
                          <stringProp name="Header.name">Internal-Key</stringProp>
                          <stringProp name="Header.value">\${__P(api_key)}</stringProp>
                        </elementProp>
                        <elementProp name="accept" elementType="Header">
                          <stringProp name="Header.name">accept</stringProp>
                          <stringProp name="Header.value">application/json</stringProp>
                        </elementProp>
                      </collectionProp>
                    </elementProp>
                  </HTTPSamplerProxy>
                  <hashTree/>
          
                  <!-- GET /stations/{station_id}/platforms -->
                  <HTTPSamplerProxy guiclass="HttpTestSampleGui" testclass="HTTPSamplerProxy" testname="GET /stations/{station_id}/platforms" enabled="true">
                    <elementProp name="HTTPsampler.Arguments" elementType="Arguments"/>
                    <stringProp name="HTTPSampler.domain">gw.apim.com</stringProp>
                    <stringProp name="HTTPSampler.port">8243</stringProp>
                    <stringProp name="HTTPSampler.protocol">https</stringProp>
                    <stringProp name="HTTPSampler.path">/trainstationapi/1.0.0/stations/\${station_id}/platforms</stringProp>
                    <stringProp name="HTTPSampler.method">GET</stringProp>
                    <boolProp name="HTTPSampler.follow_redirects">true</boolProp>
                    <boolProp name="HTTPSampler.use_keepalive">true</boolProp>
                    <elementProp name="HeaderManager.headers" elementType="HeaderManager">
                      <collectionProp name="HeaderManager.headers">
                        <elementProp name="Internal-Key" elementType="Header">
                          <stringProp name="Header.name">Internal-Key</stringProp>
                          <stringProp name="Header.value">\${__P(api_key)}</stringProp>
                        </elementProp>
                        <elementProp name="accept" elementType="Header">
                          <stringProp name="Header.name">accept</stringProp>
                          <stringProp name="Header.value">application/json</stringProp>
                        </elementProp>
                      </collectionProp>
                    </elementProp>
                  </HTTPSamplerProxy>
                  <hashTree/>
          
                  <!-- GET /stations/{station_id}/trains -->
                  <HTTPSamplerProxy guiclass="HttpTestSampleGui" testclass="HTTPSamplerProxy" testname="GET /stations/{station_id}/trains" enabled="true">
                    <elementProp name="HTTPsampler.Arguments" elementType="Arguments"/>
                    <stringProp name="HTTPSampler.domain">gw.apim.com</stringProp>
                    <stringProp name="HTTPSampler.port">8243</stringProp>
                    <stringProp name="HTTPSampler.protocol">https</stringProp>
                    <stringProp name="HTTPSampler.path">/trainstationapi/1.0.0/stations/\${station_id}/trains</stringProp>
                    <stringProp name="HTTPSampler.method">GET</stringProp>
                    <boolProp name="HTTPSampler.follow_redirects">true</boolProp>
                    <boolProp name="HTTPSampler.use_keepalive">true</boolProp>
                    <elementProp name="HeaderManager.headers" elementType="HeaderManager">
                      <collectionProp name="HeaderManager.headers">
                        <elementProp name="Internal-Key" elementType="Header">
                          <stringProp name="Header.name">Internal-Key</stringProp>
                          <stringProp name="Header.value">\${__P(api_key)}</stringProp>
                        </elementProp>
                        <elementProp name="accept" elementType="Header">
                          <stringProp name="Header.name">accept</stringProp>
                          <stringProp name="Header.value">application/json</stringProp>
                        </elementProp>
                      </collectionProp>
                    </elementProp>
                  </HTTPSamplerProxy>
                  <hashTree/>
                </hashTree>
              </hashTree>
            </hashTree>
          </jmeterTestPlan>
          EOF

      - name: Run JMeter Test
        run: |
          apache-jmeter-5.5/bin/jmeter \
            -n \
            -t jmeter/trainstation_test.jmx \
            -l jmeter/results.jtl \
            -Japi_key="${{ secrets.INTERNAL_KEY }}"

      - name: Display JMeter Results
        run: |
          echo "==== JMeter Test Results ===="
          head -n 1 jmeter/results.jtl | tr ',' '\t' > jmeter/formatted_results.txt
          tail -n +2 jmeter/results.jtl | awk -F',' '{ printf "%s\t%s\t%s\t%s\t%s\t%s\n", $1, $2 "ms", $3, $4, $5, $14 }' >> jmeter/formatted_results.txt
          column -t -s $'\t' jmeter/formatted_results.txt

      - name: Upload JMeter Results
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results
          path: jmeter/results.jtl
